    <!-- Service Worker Registration with iOS Fix -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // First, unregister any existing service workers to fix corrupted caches
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const registration of registrations) {
              // Check if it's an old version
              if (registration.active && !registration.active.scriptURL.includes('sw.js')) {
                await registration.unregister();
                console.log('[PWA] Unregistered old service worker');
              }
            }
            
            // Register the new service worker
            const registration = await navigator.serviceWorker.register('/sw.js', {
              updateViaCache: 'none' // Always check for updates
            });
            console.log('[PWA] Service Worker registered:', registration.scope);
            
            // Force update check
            registration.update();
          } catch (error) {
            console.log('[PWA] Service Worker error:', error);
          }
        });
      }
    </script>
